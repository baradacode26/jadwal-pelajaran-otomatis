docker-compose:
  version: '3.8'
  services:
    postgres:
      image: postgres:15-alpine
      ports:
        - '5432:5432'
      environment:
        POSTGRES_DB: jadwal_pelajaran
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ['CMD-SHELL', 'pg_isready -U postgres']
        interval: 10s
        timeout: 5s
        retries: 5

    redis:
      image: redis:7-alpine
      ports:
        - '6379:6379'
      healthcheck:
        test: ['CMD', 'redis-cli', 'ping']
        interval: 10s
        timeout: 5s
        retries: 5

    backend:
      build:
        context: .
        dockerfile: backend/Dockerfile
      ports:
        - '5000:5000'
      environment:
        DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jadwal_pelajaran
        REDIS_URL: redis://redis:6379
        JWT_SECRET: your_secret_key_here
        NODE_ENV: development
        BACKEND_PORT: 5000
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      volumes:
        - ./backend/src:/app/src
      command: npm run dev

    frontend:
      build:
        context: .
        dockerfile: frontend/Dockerfile.dev
      ports:
        - '3000:3000'
      environment:
        VITE_API_URL: http://localhost:5000/api/v1
      depends_on:
        - backend
      volumes:
        - ./frontend/src:/app/src
      command: npm run dev

volumes:
  postgres_data:
